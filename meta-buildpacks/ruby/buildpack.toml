api = "0.9"

[buildpack]
id = "heroku/ruby"
version = "2.0.0"
name = "Ruby"
homepage = "https://github.com/heroku/buildpacks-ruby"
description = "Official Heroku buildpack for using Ruby to target Cloud Native Buildpack (CNB) builds."
keywords = ["ruby", "rails"]

[[buildpack.licenses]]
type = "BSD-3-Clause"

[[order]]
  [[order.group]]
    id = "heroku/nodejs-engine"
    version = "1.1.1"
    optional = true
  [[order.group]]
    id = "heroku/nodejs-yarn"
    version = "1.1.1"
    optional = true
  [[order.group]]
    id = "heroku/jvm"
    version = "1.0.10"
    optional = true
  [[order.group]]
    id = "heroku/ruby-internal"
    version = "2.0.0"
  [[order.group]]
    id = "heroku/procfile"
    version = "2.0.0"
    optional = true

[metadata]
[metadata.release]
[metadata.release.docker]
repository = "docker.io/heroku/buildpack-ruby"
